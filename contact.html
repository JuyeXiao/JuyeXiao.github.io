<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <script>document.documentElement.classList.add('js');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 - 肖炬晔 - 数据分析师作品集</title>
    
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500&display=swap" rel="stylesheet">
    
    <!-- 引入图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 引用主页样式 -->
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="stylesheet" href="assets/css/contact.css" />
</head>
<body class="transition-colors duration-300">

    <!-- 背景装饰 -->
    <div class="gradient-orb top-[-150px] left-[-150px]"></div>
    <div class="gradient-orb bottom-[-200px] right-[-200px]" style="background: radial-gradient(circle at center, var(--blue), transparent 60%);"></div>

    <!-- 导航栏 -->
    <header id="navbar" class="navbar fixed top-0 left-0 right-0 z-50">
        <div class="container-main h-full flex items-center justify-between">
            <!-- Logo部分 -->
            <a href="index.html" class="navbar-logo" id="navbar-logo">
                <!-- SVG Logo -->
                <svg class="logo-svg-nav" viewBox="0 0 40 40">
                    <!-- 背景数据网格 -->
                    <g class="grid-bg">
                        <!-- 垂直线 -->
                        <line class="grid-line-v" x1="8" y1="0" x2="8" y2="40" style="animation-delay: 0.1s, 0s" />
                        <line class="grid-line-v" x1="16" y1="0" x2="16" y2="40" style="animation-delay: 0.2s, 0.5s" />
                        <line class="grid-line-v" x1="24" y1="0" x2="24" y2="40" style="animation-delay: 0.3s, 1s" />
                        <line class="grid-line-v" x1="32" y1="0" x2="32" y2="40" style="animation-delay: 0.4s, 1.5s" />
                        
                        <!-- 水平线 -->
                        <line class="grid-line-h" x1="0" y1="10" x2="40" y2="10" style="animation-delay: 0.5s, 0s" />
                        <line class="grid-line-h" x1="0" y1="20" x2="40" y2="20" style="animation-delay: 0.6s, 0.7s" />
                        <line class="grid-line-h" x1="0" y1="30" x2="40" y2="30" style="animation-delay: 0.7s, 1.4s" />
                    </g>
                    
                    <!-- 织梭动画线 -->
                    <line class="weaver-line" id="weaverLine" x1="0" y1="20" x2="40" y2="20" />
                    
                    <!-- JX字母 -->
                    <text class="logo-letters" id="logoLetters" x="20" y="26" text-anchor="middle">JX</text>
                </svg>
                
                <!-- 名字签名（悬停显示） -->
                <div class="logo-name">
                    <div class="logo-name-text">Juye Xiao</div>
                    <div class="logo-name-subtitle">Data Analyst</div>
                </div>
            </a>
            <nav class="hidden md:flex items-center space-x-8">
                <a href="index.html#about" class="nav-link">关于</a>
                <a href="index.html#experience" class="nav-link">经历</a>
                <a href="index.html#education" class="nav-link">教育</a>
                <a href="index.html#projects" class="nav-link">项目</a>
                <a href="index.html#skills" class="nav-link">技能</a>
                <a href="contact.html" class="nav-link active">联系</a>
            </nav>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="btn-secondary !p-2 !rounded-full" aria-label="切换主题">
                    <i data-lucide="sun" class="block dark:hidden"></i>
                    <i data-lucide="moon" class="hidden dark:block"></i>
                </button>
                <button id="lang-toggle" class="btn-secondary !p-2 !rounded-full">
                    <span class="font-bold text-sm">EN</span>
                </button>
                <button id="menu-toggle" class="btn-secondary !p-2 !rounded-full md:hidden"
                    aria-label="打开菜单" aria-expanded="false" aria-controls="mobile-menu">
                    <i data-lucide="menu" class="menu-icon-open"></i>
                    <i data-lucide="x" class="menu-icon-close"></i>
                </button>
            </div>
        </div>
        <nav id="mobile-menu" class="mobile-menu md:hidden" aria-label="移动端导航">
            <a href="index.html#about" class="nav-link">关于</a>
            <a href="index.html#experience" class="nav-link">经历</a>
            <a href="index.html#education" class="nav-link">教育</a>
            <a href="index.html#projects" class="nav-link">项目</a>
            <a href="index.html#skills" class="nav-link">技能</a>
            <a href="contact.html" class="nav-link active">联系</a>
        </nav>
    </header>

    <main class="container-main">
        <!-- Hero Section -->
        <section id="contact-hero" class="section-padding min-h-screen flex items-center" style="padding-top: calc(var(--space-xl) + 72px);">
            <div class="w-full max-w-6xl mx-auto">
                <!-- 页面标题 -->
                <div class="text-center mb-20 reveal">
                    <h1 class="text-4xl md:text-5xl font-bold">期待与你交流</h1>
                    <p class="subtitle mt-4 max-w-2xl mx-auto">如果你对我的项目感兴趣，或有任何合作机会，请随时与我联系。我会尽快回复你的消息。</p>
                </div>

                <!-- 主要内容区域 -->
                <div class="contact-main-layout">
                    <!-- 联系表单 -->
                    <div class="contact-form-section reveal">
                        <div class="contact-card-simple">
                            <form class="space-y-6" id="contact-form"
                                  action="https://api.web3forms.com/submit" method="POST">
                                <input type="hidden" name="access_key" value="c89b3bdb-5991-4936-ac1f-38ff3b5256f2">
                                <input type="hidden" name="subject" value="来自作品集网站的新消息">
                                <input type="hidden" name="from_name" value="作品集联系表单">
                                <div class="grid md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="contact-label" for="contact-name">姓名</label>
                                        <input type="text" id="contact-name" name="name" class="contact-input" placeholder="请输入您的姓名" required autocomplete="name">
                                    </div>
                                    <div>
                                        <label class="contact-label" for="contact-email">邮箱</label>
                                        <input type="email" id="contact-email" name="email" class="contact-input" placeholder="name@example.com" required autocomplete="email">
                                    </div>
                                </div>
                                <div>
                                    <label class="contact-label" for="contact-message">消息</label>
                                    <textarea id="contact-message" name="message" rows="8" class="contact-input" placeholder="请简单描述您的需求或想交流的话题" required></textarea>
                                </div>
                                <!-- 蜜罐字段：对人/AT/键盘隐藏，机器人填写后 Web3Forms 会丢弃 -->
                                <input type="checkbox" name="botcheck" class="hp-field" tabindex="-1" aria-hidden="true" autocomplete="off">
                                <div class="flex gap-4">
                                    <button type="submit" class="btn-contact-primary">发送消息</button>
                                    <button type="button" class="btn-contact-secondary" onclick="window.location.href='mailto:jx2479@columbia.edu'">直接邮件</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- 信息展示区域 -->
                    <div class="contact-info-layout reveal">
                        <!-- 联系信息 -->
                        <div class="contact-info-card">
                            <h2 class="text-2xl font-semibold mb-8" style="color: var(--charcoal);">联系信息</h2>
                            <div class="space-y-8">
                                <div class="flex items-center gap-6">
                                    <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background-color: var(--beige);">
                                        <i data-lucide="mail" style="color: var(--coral);" class="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-lg" style="color: var(--dark);">邮箱</h3>
                                        <p class="text-lg" style="color: var(--brown);">jx2479@columbia.edu</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-6">
                                    <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background-color: var(--beige);">
                                        <i data-lucide="phone" style="color: var(--coral);" class="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-lg" style="color: var(--dark);">手机</h3>
                                        <p class="text-lg" style="color: var(--brown);">13436826896</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-6">
                                    <div class="w-16 h-16 rounded-full flex items-center justify-center" style="background-color: var(--beige);">
                                        <i data-lucide="map-pin" style="color: var(--coral);" class="w-6 h-6"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-lg" style="color: var(--dark);">位置</h3>
                                        <p class="text-lg" style="color: var(--brown);">美国洛杉矶</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 回复时间和社交媒体 -->
                        <div class="contact-info-card">
                            <div class="mb-8">
                                <h2 class="text-2xl font-semibold mb-6" style="color: var(--charcoal);">回复时间</h2>
                                <div class="p-6 rounded-lg" style="background-color: var(--beige);">
                                    <p class="text-lg" style="color: var(--brown);">我通常在24小时内回复邮件。如果有紧急事务，请直接致电。</p>
                                </div>
                            </div>
                            
                            <div>
                                <h3 class="text-xl font-semibold mb-6" style="color: var(--charcoal);">社交媒体</h3>
                                <div class="flex gap-4">
                                    <a href="#" class="w-16 h-16 rounded-full flex items-center justify-center border-2 border-tan hover:border-coral transition-all duration-300 hover:transform hover:scale-110" style="border-color: var(--tan);">
                                        <i data-lucide="github" style="color: var(--dark);" class="w-6 h-6"></i>
                                    </a>
                                    <a href="#" class="w-16 h-16 rounded-full flex items-center justify-center border-2 border-tan hover:border-coral transition-all duration-300 hover:transform hover:scale-110" style="border-color: var(--tan);">
                                        <i data-lucide="linkedin" style="color: var(--dark);" class="w-6 h-6"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="container-main py-8 mt-12 border-t border-beige text-center text-sm" style="color: var(--brown);">
        <p>&copy; 2026 肖炬晔. All Rights Reserved.</p>
    </footer>

    <!-- 引入Logo动画JavaScript -->
    <script src="assets/js/logo.js"></script>
    <!-- 引入公共模块 -->
    <script src="assets/js/common.js"></script>
    <!-- 引入联系页面专用JavaScript -->
    <script src="assets/js/contact.js"></script>
    <!-- 语言切换模块 -->
    <script src="assets/js/language-switcher.js"></script>
</body>
</html>
